<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Companion</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/crt-effects.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>

  <!-- CRT scanline overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Custom title bar -->
  <div id="title-bar">
    <div id="title-bar-left">
      <button id="char-selector" class="char-selector" title="Switch character">
        <span class="char-selector-diamond">◈</span>
        <span id="char-name">···</span>
        <span class="char-selector-arrow">▾</span>
      </button>
      <span class="version">v0.1</span>
    </div>
    <!-- Character picker dropdown (positioned absolute, anchored to title-bar-left) -->
    <div id="char-picker" class="hidden"></div>
    <div id="source-indicators">
      <span id="badge-filler" class="source-badge badge-filler" title="Filler response">FILLER ●</span>
      <span id="badge-local"  class="source-badge badge-local"  title="Local brain response">LOCAL ●</span>
      <span id="badge-claude" class="source-badge badge-claude" title="Claude response">CLAUDE ●</span>
    </div>
    <div id="window-controls">
      <button class="win-btn" id="btn-minimize" title="Minimize">─</button>
      <button class="win-btn" id="btn-maximize" title="Maximize">□</button>
      <button class="win-btn btn-close" id="btn-close" title="Close">✕</button>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-content">

    <!-- Left: companion output (dialogue + thoughts) -->
    <div id="output-panel">
      <div id="companion-output">
        <div class="panel-label">// COMPANION_OUTPUT</div>
        <div id="dialogue-text" class="dialogue-text"></div>
      </div>
      <div id="internal-state">
        <div class="panel-label">// INTERNAL_STATE</div>
        <div id="thoughts-text" class="thoughts-text"></div>
        <div id="emotion-badge" class="emotion-badge"></div>
      </div>
    </div>

    <!-- Right: portrait -->
    <div id="portrait-panel">
      <div id="portrait-frame">
        <img id="companion-portrait" src="" alt="Companion" />
        <div id="portrait-glow" aria-hidden="true"></div>
      </div>
    </div>

  </div>

  <!-- Bottom: input area -->
  <div id="input-area">
    <div id="input-row">
      <img id="avatar-img" src="" alt="" />
      <textarea id="user-input" placeholder="Type a message..." rows="2" maxlength="2000" spellcheck="false"></textarea>
      <button id="btn-send">SEND</button>
    </div>

    <!-- TTS playbar: replay, scrub, time, volume -->
    <div id="tts-playbar">
      <button id="btn-replay" title="Replay last audio" disabled>↺ REPLAY</button>
      <div id="tts-progress-wrap">
        <input type="range" id="tts-seek" min="0" max="100" value="0" step="0.1" disabled />
      </div>
      <span id="tts-time">0:00</span>
      <span class="tts-sep">│</span>
      <span class="tts-vol-label">VOL</span>
      <input type="range" id="tts-volume" min="0" max="1" value="1" step="0.02" title="Volume" />
    </div>

    <!-- 4 action buttons -->
    <div id="action-buttons">
      <button class="action-btn" id="btn-mic"     title="Mic toggle (F2)">🎤 MIC</button>
      <button class="action-btn" id="btn-folder"  title="Attach file or folder">📁 FOLDER</button>
      <button class="action-btn" id="btn-screen"  title="Capture screen">👁 SCREEN</button>
      <button class="action-btn" id="btn-emotion" title="Set emotion context">😊 EMOTION</button>
      <button class="action-btn" id="btn-save-chat" title="Save this conversation to Aria's long-term memory">💾 SAVE CHAT</button>
      <button class="action-btn" id="btn-axis"         title="View Aria's persistent emotional axis state">💠 AXIS</button>
<div class="voice-btn-group">
        <button class="action-btn" id="btn-voice" title="Toggle Aria's voice (TTS)">🔊 VOICE</button><button class="action-btn action-btn-caret" id="btn-voice-picker" title="Select voice">▾</button>
      </div>
    </div>

    <!-- Voice picker popup -->
    <div id="voice-picker" class="hidden"></div>

    <!-- Attachment bar -->
    <div id="attachment-bar" class="hidden">
      <div id="attachment-list"></div>
    </div>

    <!-- Emotion picker popup -->
    <div id="emotion-picker" class="hidden">
      <div id="emotion-grid"></div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">// QUERYING CLAUDE...</div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="hidden"></div>

  <!-- Renderer scripts (order matters) -->
  <script src="js/ui-effects.js"></script>
  <script src="js/source-indicator.js"></script>
  <script src="js/companion-display.js"></script>
  <script src="js/emotion-picker.js"></script>
  <script src="js/file-attach.js"></script>
  <script src="js/screen-capture-ui.js"></script>
  <script src="js/mic-controller.js"></script>
  <script src="js/tts-controller.js"></script>
  <script src="js/chat-controller.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
