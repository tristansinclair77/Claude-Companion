<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug Viewer</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/crt-effects.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <style>
    /* ── Debug Viewer Overrides & Extensions ─────────────────────────────── */

    /* Slot selector in title bar */
    #slot-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    #slot-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--cyan-dim);
    }
    .slot-btn {
      background: none;
      border: 1px solid var(--border-glow);
      color: var(--cyan-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, text-shadow 0.15s;
    }
    .slot-btn:hover  { border-color: var(--cyan); color: var(--cyan); }
    .slot-btn.active { border-color: var(--cyan); color: var(--cyan); text-shadow: 0 0 6px var(--cyan); background: #00ffcc11; }
    .slot-btn.empty  { opacity: 0.2; cursor: default; pointer-events: none; }

    /* System prompt button */
    #btn-sysprompt {
      background: none;
      border: 1px solid #aa44ff44;
      color: var(--purple);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 10px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.15s, color 0.15s;
    }
    #btn-sysprompt:hover   { background: #aa44ff22; color: #cc66ff; }
    #btn-sysprompt:disabled { opacity: 0.2; cursor: default; }

    /* Source badge in title bar — reused from main.css but shown as label */
    #debug-source-badge {
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 6px;
      border: 1px solid transparent;
    }

    /* Exchange counter / nav bar */
    #nav-bar {
      height: 36px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .nav-arrow {
      background: none;
      border: 1px solid var(--cyan-dim);
      color: var(--cyan-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 28px;
      height: 22px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, text-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-arrow:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
    .nav-arrow:disabled { opacity: 0.2; cursor: default; }

    #exchange-counter {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--cyan-dim);
    }
    #exchange-counter .current { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

    /* Timestamp row in nav */
    #nav-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--cyan-dim);
    }
    #nav-timestamp { color: #335544; }
    #nav-source-badge { }

    /* Main content — same as main app but slightly adjusted height */
    #main-content {
      height: calc(100vh - var(--title-h) - 36px - var(--debug-input-h));
    }

    /* Memories section below internal-state */
    #memory-section {
      border-top: 1px solid var(--border-glow);
      padding-top: 10px;
      margin-top: 8px;
    }
    #memory-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }
    .memory-chip {
      font-size: 11px;
      color: var(--green);
      border-left: 2px solid var(--green);
      padding: 2px 8px;
      background: #00ff8808;
      line-height: 1.4;
    }
    .memory-chip .mem-cat {
      color: var(--cyan-dim);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 4px;
    }
    #memory-section.empty { display: none; }

    /* ── Debug Input Area (replaces normal input area) ─────────────────── */
    :root { --debug-input-h: 88px; }

    #debug-input-area {
      height: var(--debug-input-h);
      background: var(--bg-input);
      border-top: 1px solid var(--border-glow);
      display: flex;
      flex-direction: column;
      padding: 8px 12px 6px;
      flex-shrink: 0;
      position: relative;
    }

    #debug-user-message-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    #debug-user-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--cyan-dim);
      margin-top: 4px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    #debug-user-text {
      flex: 1;
      background: var(--bg-mid);
      border: 1px solid var(--cyan-dim);
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 5px 8px;
      line-height: 1.4;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--cyan-dim) transparent;
      user-select: text;
      max-height: calc(var(--debug-input-h) - 28px);
      word-break: break-word;
    }

    #debug-status-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 5px;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--cyan-dim);
      flex-shrink: 0;
    }
    #debug-status-time { color: #335544; }

    /* Emotion in status row */
    .debug-emotion-tag {
      padding: 1px 6px;
      border: 1px solid var(--border-glow);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Empty / no-session state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--cyan-dim);
      font-size: 12px;
      letter-spacing: 2px;
      gap: 8px;
    }
    #empty-state .empty-icon { font-size: 32px; opacity: 0.3; }

    /* Keyboard hint */
    .key-hint {
      font-size: 10px;
      color: #224433;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- CRT overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Title bar -->
  <div id="title-bar">
    <div id="title-bar-left">
      <span class="app-name">DEBUG <span class="version">VIEWER</span></span>
    </div>

    <!-- Slot selector -->
    <div id="slot-selector">
      <span id="slot-label">SLOT:</span>
      <button class="slot-btn empty" id="slot-btn-1" data-slot="1">1</button>
      <button class="slot-btn empty" id="slot-btn-2" data-slot="2">2</button>
      <button class="slot-btn empty" id="slot-btn-3" data-slot="3">3</button>
      <button class="slot-btn empty" id="slot-btn-4" data-slot="4">4</button>
      <button class="slot-btn empty" id="slot-btn-5" data-slot="5">5</button>
      <!-- Pinned sessions inserted here dynamically -->
      <span id="pinned-sep" style="display:none;color:#335544;margin:0 4px;font-size:10px;">|</span>
      <span id="pinned-label" style="display:none;font-size:10px;letter-spacing:1px;color:#aa44ff66;">📌</span>
      <div id="pinned-btns" style="display:contents;"></div>
    </div>

    <!-- Right side: saved chats + sys-prompt button + window controls -->
    <div style="display:flex;align-items:center;gap:8px;-webkit-app-region:no-drag;">
      <button id="btn-saved" title="View saved conversations" style="background:none;border:1px solid #aa44ff44;color:#aa44ff;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:2px 10px;cursor:pointer;transition:background 0.15s,color 0.15s;">SAVED CHATS</button>
      <button id="btn-pin" disabled title="Pin current slot so it won't be rotated away" style="background:none;border:1px solid #aa44ff44;color:#664488;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:2px 10px;cursor:pointer;transition:background 0.15s,color 0.15s;opacity:0.4;">📌 PIN</button>
      <button id="btn-save-session" disabled title="Save this session transcript + summary to memory" style="background:none;border:1px solid #00ffcc44;color:var(--cyan-dim);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:2px 10px;cursor:pointer;transition:background 0.15s,color 0.15s;opacity:0.4;">SAVE SESSION</button>
      <button id="btn-extract-mem" disabled title="Re-scan this session and extract memories with current AI logic" style="background:none;border:1px solid #00ff8844;color:#00aa44;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:2px 10px;cursor:pointer;transition:background 0.15s,color 0.15s;opacity:0.4;">EXTRACT MEM</button>
      <button id="btn-sysprompt" disabled title="View system prompt for this exchange">SYS-PROMPT</button>
      <div id="window-controls">
        <button class="win-btn" id="btn-minimize" title="Minimize">─</button>
        <button class="win-btn" id="btn-maximize" title="Maximize">□</button>
        <button class="win-btn btn-close" id="btn-close" title="Close">✕</button>
      </div>
    </div>
  </div>

  <!-- Exchange nav bar -->
  <div id="nav-bar">
    <button class="nav-arrow" id="btn-prev" disabled title="Previous exchange (←)">◂</button>
    <div id="exchange-counter">
      <span class="current" id="counter-current">—</span>
      <span> / </span>
      <span id="counter-total">—</span>
      <span id="mem-indicator" title="This exchange has memory extractions" style="margin-left:8px;display:none;color:#aa44ff;text-shadow:0 0 6px #aa44ff;font-size:10px;letter-spacing:1px;">MEM ●</span>
    </div>
    <div id="nav-meta">
      <span id="nav-timestamp">—</span>
      <span id="nav-source-badge"></span>
    </div>
    <button class="nav-arrow" id="btn-next" disabled title="Next exchange (→)">▸</button>
  </div>

  <!-- Main content (same layout as companion app) -->
  <div id="main-content">

    <!-- Left: output panel -->
    <div id="output-panel">
      <div id="companion-output">
        <div class="panel-label">// COMPANION_OUTPUT</div>
        <div id="dialogue-text" class="dialogue-text">
          <div id="empty-state">
            <span class="empty-icon">◈</span>
            <span>SELECT A SLOT TO BEGIN</span>
          </div>
        </div>
      </div>

      <div id="internal-state">
        <div class="panel-label">// INTERNAL_STATE</div>
        <div id="thoughts-text" class="thoughts-text"></div>
        <div id="emotion-badge" class="emotion-badge"></div>
      </div>

      <div id="memory-section" class="empty">
        <div class="panel-label">// NEW_MEMORIES</div>
        <div id="memory-list"></div>
      </div>
    </div>

    <!-- Right: portrait -->
    <div id="portrait-panel">
      <div id="portrait-frame">
        <img id="companion-portrait" src="" alt="Companion" />
        <div id="portrait-glow" aria-hidden="true"></div>
      </div>
    </div>

  </div>

  <!-- Debug input area (replaces input+buttons) -->
  <div id="debug-input-area">
    <div id="debug-user-message-row">
      <span id="debug-user-label">USER:</span>
      <div id="debug-user-text">—</div>
    </div>
    <div id="debug-status-row">
      <span id="debug-status-time" class="debug-status-time">—</span>
      <span id="debug-status-emotion" class="debug-emotion-tag" style="display:none"></span>
      <span class="key-hint">← → NAVIGATE &nbsp;|&nbsp; SLOT 1–5 KEYS</span>
    </div>
  </div>

  <!-- Saved conversations overlay -->
  <div id="saved-overlay" style="display:none;position:fixed;inset:0;z-index:100;background:#0a0a0f;display:none;flex-direction:column;">
    <div style="height:32px;background:#0d0d16;border-bottom:1px solid #aa44ff44;display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;">
      <span style="font-size:11px;letter-spacing:3px;color:#aa44ff;text-shadow:0 0 8px #aa44ff88;">// SAVED_CONVERSATIONS</span>
      <button id="btn-saved-back" style="background:none;border:1px solid #00ffcc44;color:var(--cyan-dim);font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:2px 10px;cursor:pointer;">◂ BACK</button>
    </div>
    <div style="display:flex;flex:1;min-height:0;overflow:hidden;">
      <!-- List panel -->
      <div id="saved-list" style="width:260px;flex-shrink:0;border-right:1px solid #aa44ff22;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:#aa44ff33 transparent;"></div>
      <!-- Transcript panel -->
      <div id="saved-transcript" style="flex:1;overflow-y:auto;padding:16px 20px;scrollbar-width:thin;scrollbar-color:#007755 transparent;font-size:12px;line-height:1.7;color:var(--cyan-dim);">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#335544;letter-spacing:2px;font-size:11px;">SELECT A SAVED CONVERSATION</div>
      </div>
    </div>
  </div>

  <script src="js/debug-viewer.js"></script>
</body>
</html>
