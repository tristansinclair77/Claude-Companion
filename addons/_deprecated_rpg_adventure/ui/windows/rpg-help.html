<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adventure — Help</title>
  <style>
    :root {
      --cyan:     #00ffcc;
      --orange:   #ff8800;
      --red:      #ff2244;
      --yellow:   #ffdd00;
      --purple:   #aa44ff;
      --green:    #00ff88;
      --magenta:  #ff00aa;
      --font-mono: 'Consolas', 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #080812;
      color: var(--cyan);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Layout ── */
    #help-root { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #help-header {
      background: #0b0b18;
      border-bottom: 1px solid #00ffcc22;
      padding: 7px 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #help-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--orange);
      text-shadow: 0 0 8px var(--orange);
      white-space: nowrap;
    }
    #help-search {
      flex: 1;
      background: #09091a;
      border: 1px solid #00ffcc33;
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 2px;
      outline: none;
      letter-spacing: 0.5px;
    }
    #help-search::placeholder { color: #00ffcc33; }
    #help-search:focus { border-color: var(--cyan); }
    #help-search-clear {
      background: none;
      border: none;
      color: #00ffcc44;
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      display: none;
    }
    #help-search-clear:hover { color: var(--red); }

    /* ── Scrollable content ── */
    #help-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: #00ffcc22 transparent;
    }
    #help-content::-webkit-scrollbar       { width: 3px; }
    #help-content::-webkit-scrollbar-track { background: transparent; }
    #help-content::-webkit-scrollbar-thumb { background: #00ffcc22; border-radius: 2px; }

    /* ── Category blocks ── */
    .h-category { margin-bottom: 4px; }

    .h-cat-header {
      width: 100%;
      background: #0d0d1e;
      border: 1px solid #00ffcc1a;
      color: var(--orange);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 2px;
      text-align: left;
      transition: background 0.12s;
      margin-top: 4px;
    }
    .h-cat-header:hover { background: #00ffcc0a; }
    .h-cat-arrow { color: #00ffcc55; font-size: 8px; transition: transform 0.18s; }
    .h-category.collapsed .h-cat-arrow { transform: rotate(-90deg); }

    .h-cat-body {
      overflow: hidden;
      max-height: 3000px;
      transition: max-height 0.25s ease;
    }
    .h-category.collapsed .h-cat-body { max-height: 0; }

    /* ── Entries ── */
    .h-entry {
      border-left: 2px solid #00ffcc0e;
      padding: 6px 8px 6px 12px;
      margin: 2px 0 2px 2px;
      transition: border-color 0.1s;
    }
    .h-entry:hover { border-left-color: #00ffcc44; background: #00ffcc04; }

    .h-entry-title {
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .h-entry-body {
      font-size: 9px;
      color: #00ffcc66;
      line-height: 1.65;
    }
    .h-entry-body b   { color: var(--yellow); font-weight: normal; }
    .h-entry-body .tag  { color: var(--magenta); }
    .h-entry-body .good { color: var(--green); }
    .h-entry-body .bad  { color: var(--red); }
    .h-entry-body .boss { color: var(--purple); }
    .h-entry-body .rare { color: #5599ff; }

    /* ── No results ── */
    #help-no-results {
      display: none;
      text-align: center;
      color: #00ffcc33;
      font-size: 9px;
      font-style: italic;
      padding: 30px 0;
    }

    /* ── Filtered-out entries ── */
    .h-hidden { display: none !important; }
  </style>
</head>
<body>

    <span id="help-title">? ADVENTURE HELP</span>

    <button id="help-search-clear" title="Clear search">✕</button>
  </div>
  <div id="help-content">
    <div id="help-no-results">No results found. Try a different search term.</div>
  </div>
</div>

/* ── Rendering ─────────────────────────────────────────────────────────────── */

function escText(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildHelp() {
  const container = document.getElementById('help-content');
  const noResults = document.getElementById('help-no-results');

  for (const cat of HELP_DATA) {
    const catEl = document.createElement('div');
    catEl.className   = 'h-category';
    catEl.dataset.catId = cat.id;

    const headerBtn = document.createElement('button');
    headerBtn.className = 'h-cat-header';
    headerBtn.innerHTML = `<span>${escText(cat.title)}</span><span class="h-cat-arrow">▼</span>`;
    headerBtn.addEventListener('click', () => catEl.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'h-cat-body';

    for (let i = 0; i < cat.entries.length; i++) {
      const entry   = cat.entries[i];
      const entryEl = document.createElement('div');
      entryEl.className       = 'h-entry';
      entryEl.dataset.idx     = i;
      // Store plain-text versions for search matching
      entryEl.dataset.srchTitle = entry.title.toLowerCase();
      entryEl.dataset.srchBody  = entry.body.replace(/<[^>]+>/g, '').toLowerCase();

      const titleEl = document.createElement('div');
      titleEl.className   = 'h-entry-title';
      titleEl.textContent = entry.title;

      const bodyEl = document.createElement('div');
      bodyEl.className = 'h-entry-body';
      bodyEl.innerHTML = entry.body; // authored HTML — safe

      entryEl.appendChild(titleEl);
      entryEl.appendChild(bodyEl);
      body.appendChild(entryEl);
    }

    catEl.appendChild(headerBtn);
    catEl.appendChild(body);
    container.insertBefore(catEl, noResults);
  }
}

/* ── Search ────────────────────────────────────────────────────────────────── */

let _searchTimer = null;

function doSearch(query) {
  const q         = query.trim().toLowerCase();
  const noResults = document.getElementById('help-no-results');
  const clearBtn  = document.getElementById('help-search-clear');
  clearBtn.style.display = q ? '' : 'none';

  const categories = document.querySelectorAll('.h-category');
  let totalVisible = 0;

  for (const cat of categories) {
    if (!q) {
      // Clear search: show all, restore collapse state
      cat.classList.remove('h-hidden');
      cat.querySelectorAll('.h-entry').forEach(e => e.classList.remove('h-hidden'));
      continue;
    }

    // Active search: expand category, filter entries
    cat.classList.remove('collapsed');
    let catHasMatch = false;

    cat.querySelectorAll('.h-entry').forEach(entry => {
      const inTitle = (entry.dataset.srchTitle || '').includes(q);
      const inBody  = (entry.dataset.srchBody  || '').includes(q);
      if (inTitle || inBody) {
        entry.classList.remove('h-hidden');
        catHasMatch = true;
        totalVisible++;
      } else {
        entry.classList.add('h-hidden');
      }
    });

    if (catHasMatch) cat.classList.remove('h-hidden');
    else             cat.classList.add('h-hidden');
  }

  noResults.style.display = (q && totalVisible === 0) ? '' : 'none';
}

/* ── Init ──────────────────────────────────────────────────────────────────── */

buildHelp();

const searchInput = document.getElementById('help-search');
const clearBtn    = document.getElementById('help-search-clear');

searchInput.addEventListener('input', () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => doSearch(searchInput.value), 120);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  doSearch('');
  searchInput.focus();
});

searchInput.focus();
</script>
